name: Contracts — Deep Test

on:
  push:
    paths:
      - 'contracts/**'
  pull_request:
    paths:
      - 'contracts/**'

concurrency:
  group: contracts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Foundry Test Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Cache Foundry artifacts
        uses: actions/cache@v4
        with:
          path: |
            contracts/cache
            contracts/out
          key: foundry-deep-${{ runner.os }}-${{ hashFiles('contracts/foundry.toml', 'contracts/src/**', 'contracts/test/**') }}
          restore-keys: |
            foundry-deep-${{ runner.os }}-

      - name: Install dependencies
        run: forge install

      - name: Build
        run: forge build --sizes

      - name: Unit + integration tests (verbose)
        run: forge test -vvvv

      - name: Fuzz tests (extended runs on push to main)
        if: github.ref == 'refs/heads/main'
        run: forge test --fuzz-runs 5000 -vv

      - name: Gas snapshot
        run: forge snapshot

      - name: Upload gas snapshot
        uses: actions/upload-artifact@v4
        with:
          name: gas-snapshot
          path: contracts/.gas-snapshot
          retention-days: 30

      - name: Coverage report
        run: forge coverage --report lcov
        continue-on-error: true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: contracts/lcov.info
          retention-days: 30
