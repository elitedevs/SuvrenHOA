<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" width="800" height="720">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="720" fill="white"/>

  <!-- Outer border -->
  <rect x="4" y="4" width="792" height="712" fill="none" stroke="black" stroke-width="2.5"/>
  <rect x="9" y="9" width="782" height="702" fill="none" stroke="black" stroke-width="0.75"/>

  <!-- Title block -->
  <line x1="9" y1="58" x2="791" y2="58" stroke="black" stroke-width="1"/>
  <text x="400" y="28" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold">FIG. 2</text>
  <text x="400" y="49" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10">PROPERTYNFT LIFECYCLE STATE DIAGRAM</text>

  <!-- ===================== PHASE 1: MINTING ===================== -->
  <text x="20" y="82" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold">PHASE 1 — MINTING</text>
  <line x1="20" y1="86" x2="300" y2="86" stroke="black" stroke-width="0.75"/>

  <!-- 202: REGISTRAR (Board Multisig) -->
  <rect x="20" y="95" width="140" height="55" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="24" y="106" font-family="Arial,Helvetica,sans-serif" font-size="8">202</text>
  <text x="90" y="122" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold">REGISTRAR</text>
  <text x="90" y="137" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">(Board Multisig)</text>

  <!-- Arrow: Registrar → Mint -->
  <line x1="160" y1="122" x2="248" y2="122" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
  <text x="200" y="116" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">mintProperty()</text>

  <!-- 204: MINT state (rounded rect = state) -->
  <rect x="250" y="100" width="120" height="46" rx="8" ry="8" fill="white" stroke="black" stroke-width="2"/>
  <text x="254" y="110" font-family="Arial,Helvetica,sans-serif" font-size="8">204</text>
  <text x="310" y="127" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold">MINTED</text>

  <!-- Mint step notes box -->
  <rect x="400" y="95" width="370" height="80" fill="white" stroke="black" stroke-width="1"/>
  <text x="404" y="108" font-family="Arial,Helvetica,sans-serif" font-size="8">MINT PROCESS:</text>
  <text x="410" y="122" font-family="Arial,Helvetica,sans-serif" font-size="8">1. Validate: lotNumber ≤ maxLots</text>
  <text x="410" y="135" font-family="Arial,Helvetica,sans-serif" font-size="8">2. Validate: lot not already minted</text>
  <text x="410" y="148" font-family="Arial,Helvetica,sans-serif" font-size="8">3. _safeMint(owner, tokenId)</text>
  <text x="410" y="161" font-family="Arial,Helvetica,sans-serif" font-size="8">4. Store PropertyInfo struct on-chain</text>
  <text x="410" y="174" font-family="Arial,Helvetica,sans-serif" font-size="8">5. Emit: PropertyMinted(tokenId, owner, lotNumber)</text>

  <!-- Arrow: Mint → Assign -->
  <line x1="310" y1="146" x2="310" y2="193" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
  <text x="330" y="175" font-family="Arial,Helvetica,sans-serif" font-size="8">auto-delegate</text>

  <!-- ===================== PHASE 2: ACTIVE ===================== -->
  <text x="20" y="220" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold">PHASE 2 — ACTIVE OWNERSHIP</text>
  <line x1="20" y1="224" x2="400" y2="224" stroke="black" stroke-width="0.75"/>

  <!-- 206: Assign to Wallet -->
  <rect x="250" y="195" width="120" height="46" rx="8" ry="8" fill="white" stroke="black" stroke-width="2"/>
  <text x="254" y="205" font-family="Arial,Helvetica,sans-serif" font-size="8">206</text>
  <text x="310" y="218" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold">ASSIGNED TO</text>
  <text x="310" y="232" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold">WALLET</text>

  <!-- Arrow: Assign → Active -->
  <line x1="310" y1="241" x2="310" y2="280" stroke="black" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 208: Active (voting enabled) -->
  <rect x="220" y="282" width="180" height="60" rx="8" ry="8" fill="white" stroke="black" stroke-width="2.5"/>
  <text x="224" y="293" font-family="Arial,Helvetica,sans-serif" font-size="8">208</text>
  <text x="310" y="313" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold">ACTIVE</text>
  <text x="310" y="330" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9">(Voting Enabled)</text>

  <!-- 210: PropertyInfo box -->
  <rect x="460" y="270" width="185" height="90" fill="white" stroke="black" stroke-width="1"/>
  <text x="464" y="283" font-family="Arial,Helvetica,sans-serif" font-size="8">210 — PropertyInfo Struct</text>
  <text x="470" y="298" font-family="Arial,Helvetica,sans-serif" font-size="8">lotNumber</text>
  <text x="470" y="312" font-family="Arial,Helvetica,sans-serif" font-size="8">streetAddress</text>
  <text x="470" y="326" font-family="Arial,Helvetica,sans-serif" font-size="8">squareFootage</text>
  <text x="470" y="340" font-family="Arial,Helvetica,sans-serif" font-size="8">lastDuesTimestamp</text>
  <text x="470" y="354" font-family="Arial,Helvetica,sans-serif" font-size="8">currentOwner</text>

  <!-- Arrow: Active → PropertyInfo -->
  <line x1="400" y1="312" x2="458" y2="312" stroke="black" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 212: Voting Power box -->
  <rect x="460" y="370" width="185" height="80" fill="white" stroke="black" stroke-width="1"/>
  <text x="464" y="383" font-family="Arial,Helvetica,sans-serif" font-size="8">212 — Voting Power (ERC721Votes)</text>
  <text x="470" y="399" font-family="Arial,Helvetica,sans-serif" font-size="8">getVotes(owner)</text>
  <text x="470" y="413" font-family="Arial,Helvetica,sans-serif" font-size="8">delegates(owner)</text>
  <text x="470" y="427" font-family="Arial,Helvetica,sans-serif" font-size="8">getPastVotes(owner, block)</text>
  <text x="470" y="441" font-family="Arial,Helvetica,sans-serif" font-size="8">delegateTo(other)</text>

  <line x1="400" y1="330" x2="458" y2="400" stroke="black" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ===================== PHASE 3: TRANSFER ===================== -->
  <text x="20" y="400" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold">PHASE 3 — RESTRICTED TRANSFER (Property Sale)</text>
  <line x1="20" y1="404" x2="500" y2="404" stroke="black" stroke-width="0.75"/>

  <!-- Arrow: Active → Transfer Request -->
  <line x1="310" y1="342" x2="310" y2="416" stroke="black" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 214: Transfer Request -->
  <rect x="220" y="418" width="180" height="46" rx="8" ry="8" fill="white" stroke="black" stroke-width="2"/>
  <text x="224" y="430" font-family="Arial,Helvetica,sans-serif" font-size="8">214</text>
  <text x="310" y="447" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold">TRANSFER REQUEST</text>

  <!-- Registrar approves -->
  <!-- 202b: Registrar -->
  <rect x="20" y="418" width="140" height="46" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="24" y="430" font-family="Arial,Helvetica,sans-serif" font-size="8">202</text>
  <text x="90" y="446" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold">REGISTRAR</text>

  <!-- Arrow: Registrar → Transfer Request -->
  <line x1="160" y1="441" x2="218" y2="441" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
  <text x="189" y="436" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">approveTransfer()</text>

  <!-- Soulbound constraint note -->
  <rect x="460" y="465" width="310" height="50" fill="white" stroke="black" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="614" y="482" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold">SOULBOUND CONSTRAINT (216)</text>
  <text x="614" y="498" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">_update() rejects if: to != approvedBuyer</text>
  <text x="614" y="508" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">Direct transfers without approval → REVERT</text>

  <!-- Arrow: Transfer Request → Governance Approval -->
  <line x1="310" y1="464" x2="310" y2="498" stroke="black" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 216: Governance Approval diamond -->
  <polygon points="310,500 375,530 310,560 245,530" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="310" y="527" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">GOVERNANCE</text>
  <text x="310" y="540" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">APPROVAL?</text>

  <!-- No path → Rejected -->
  <line x1="245" y1="530" x2="175" y2="530" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
  <text x="208" y="524" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">NO</text>
  <rect x="60" y="510" width="115" height="40" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="63" y="521" font-family="Arial,Helvetica,sans-serif" font-size="8">218</text>
  <text x="117" y="535" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold">REJECTED</text>

  <!-- Yes path → Re-assign -->
  <line x1="310" y1="560" x2="310" y2="592" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
  <text x="325" y="582" font-family="Arial,Helvetica,sans-serif" font-size="8">YES</text>

  <!-- 220: Re-assign -->
  <rect x="220" y="594" width="180" height="46" rx="8" ry="8" fill="white" stroke="black" stroke-width="2"/>
  <text x="224" y="605" font-family="Arial,Helvetica,sans-serif" font-size="8">220</text>
  <text x="310" y="623" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold">RE-ASSIGN TO NEW OWNER</text>

  <!-- Arrow looping back to Active -->
  <line x1="220" y1="617" x2="170" y2="617" stroke="black" stroke-width="1"/>
  <line x1="170" y1="617" x2="170" y2="312" stroke="black" stroke-width="1"/>
  <line x1="170" y1="312" x2="218" y2="312" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
  <text x="145" y="470" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8" transform="rotate(-90,145,470)">ACTIVE (208)</text>

  <!-- Admin role gate note -->
  <rect x="20" y="560" width="155" height="40" fill="white" stroke="black" stroke-width="1"/>
  <text x="97" y="575" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">222 — ADMIN ROLE GATES</text>
  <text x="97" y="590" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">REGISTRAR_ROLE required</text>

  <!-- Figure number -->
  <text x="400" y="698" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-style="italic">FIG. 2 — PropertyNFT Lifecycle State Diagram</text>
</svg>
