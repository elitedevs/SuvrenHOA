<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 860" width="800" height="860">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
    </marker>
  </defs>

  <rect width="800" height="860" fill="white"/>
  <rect x="4" y="4" width="792" height="852" fill="none" stroke="black" stroke-width="2.5"/>
  <rect x="9" y="9" width="782" height="842" fill="none" stroke="black" stroke-width="0.75"/>

  <!-- Title -->
  <line x1="9" y1="58" x2="791" y2="58" stroke="black" stroke-width="1"/>
  <text x="400" y="28" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold">FIG. 3</text>
  <text x="400" y="49" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10">GOVERNANCE PROPOSAL STATE MACHINE</text>

  <!-- ===================== TIER LEGEND ===================== -->
  <rect x="18" y="68" width="764" height="75" fill="white" stroke="black" stroke-width="1"/>
  <text x="400" y="82" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-weight="bold">PROPOSAL TIERS AND QUORUM REQUIREMENTS</text>
  <!-- Tier boxes in legend -->
  <rect x="30" y="90" width="165" height="44" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="112" y="106" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold">302 — ROUTINE</text>
  <text x="112" y="120" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">Quorum: 15%</text>
  <text x="112" y="130" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">Simple majority | Delay: 2 days</text>

  <rect x="210" y="90" width="165" height="44" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="292" y="106" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold">304 — FINANCIAL</text>
  <text x="292" y="120" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">Quorum: 33%</text>
  <text x="292" y="130" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">Simple majority | Delay: 4 days</text>

  <rect x="390" y="90" width="165" height="44" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="472" y="106" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold">306 — GOVERNANCE</text>
  <text x="472" y="120" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">Quorum: 51%</text>
  <text x="472" y="130" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">Simple majority | Delay: 4 days</text>

  <rect x="570" y="90" width="200" height="44" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="670" y="106" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold">308 — CONSTITUTIONAL</text>
  <text x="670" y="120" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">Quorum: 67%</text>
  <text x="670" y="130" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">Supermajority 66.7% | Delay: 7 days</text>

  <!-- ===================== STATE MACHINE ===================== -->

  <!-- 310: proposeWithCategory() entry -->
  <rect x="270" y="162" width="260" height="52" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="274" y="174" font-family="Arial,Helvetica,sans-serif" font-size="8">310</text>
  <text x="400" y="186" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold">proposeWithCategory()</text>
  <text x="400" y="201" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">targets, calldatas, description,</text>
  <text x="400" y="212" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">ProposalCategory, metadataUri</text>

  <!-- Arrow → PENDING -->
  <line x1="400" y1="214" x2="400" y2="248" stroke="black" stroke-width="1" marker-end="url(#arr)"/>

  <!-- 312: PENDING state -->
  <rect x="310" y="250" width="180" height="46" rx="8" ry="8" fill="white" stroke="black" stroke-width="2"/>
  <text x="314" y="262" font-family="Arial,Helvetica,sans-serif" font-size="8">312</text>
  <text x="400" y="277" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold">PENDING</text>

  <!-- Note: voting delay -->
  <text x="500" y="274" font-family="Arial,Helvetica,sans-serif" font-size="8">votingDelay: 1 day</text>
  <line x1="490" y1="273" x2="491" y2="273" stroke="black" stroke-width="0.5"/>

  <!-- Arrow → ACTIVE -->
  <line x1="400" y1="296" x2="400" y2="330" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
  <text x="415" y="318" font-family="Arial,Helvetica,sans-serif" font-size="8">delay expires</text>

  <!-- 314: ACTIVE state -->
  <rect x="290" y="332" width="220" height="80" rx="8" ry="8" fill="white" stroke="black" stroke-width="2.5"/>
  <text x="294" y="344" font-family="Arial,Helvetica,sans-serif" font-size="8">314</text>
  <text x="400" y="362" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold">ACTIVE</text>
  <text x="400" y="377" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">votingPeriod: 7 days</text>
  <text x="400" y="390" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">castVote() / castVoteWithReason()</text>
  <text x="400" y="403" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">For / Against / Abstain</text>

  <!-- Guardian cancels → CANCELED -->
  <line x1="290" y1="372" x2="180" y2="372" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
  <text x="233" y="365" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">guardian cancel</text>

  <!-- 316: CANCELED -->
  <rect x="80" y="354" width="100" height="40" rx="4" ry="4" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="84" y="366" font-family="Arial,Helvetica,sans-serif" font-size="8">316</text>
  <text x="130" y="379" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold">CANCELED</text>

  <!-- Arrow from ACTIVE → quorum check -->
  <line x1="400" y1="412" x2="400" y2="456" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
  <text x="415" y="438" font-family="Arial,Helvetica,sans-serif" font-size="8">voting ends</text>

  <!-- 318: Quorum reached? diamond -->
  <polygon points="400,458 465,490 400,522 335,490" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="400" y="486" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">QUORUM</text>
  <text x="400" y="499" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">REACHED?</text>
  <text x="400" y="512" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="7">318</text>

  <!-- No → DEFEATED (left) -->
  <line x1="335" y1="490" x2="210" y2="490" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
  <text x="268" y="482" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">NO</text>

  <!-- 320: DEFEATED (left) -->
  <rect x="110" y="472" width="100" height="40" rx="4" ry="4" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="114" y="484" font-family="Arial,Helvetica,sans-serif" font-size="8">320</text>
  <text x="160" y="497" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold">DEFEATED</text>

  <!-- Yes → threshold check -->
  <line x1="400" y1="522" x2="400" y2="558" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
  <text x="415" y="545" font-family="Arial,Helvetica,sans-serif" font-size="8">YES</text>

  <!-- 322: Threshold met? diamond -->
  <polygon points="400,560 475,592 400,624 325,592" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="400" y="586" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">THRESHOLD</text>
  <text x="400" y="599" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">MET?</text>
  <text x="400" y="613" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="7">322</text>

  <!-- No → DEFEATED (right) -->
  <line x1="475" y1="592" x2="580" y2="592" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
  <text x="527" y="584" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">NO</text>
  <rect x="580" y="574" width="100" height="40" rx="4" ry="4" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="584" y="586" font-family="Arial,Helvetica,sans-serif" font-size="8">324</text>
  <text x="630" y="599" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold">DEFEATED</text>

  <!-- Yes → SUCCEEDED -->
  <line x1="400" y1="624" x2="400" y2="658" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
  <text x="415" y="645" font-family="Arial,Helvetica,sans-serif" font-size="8">YES</text>

  <!-- 326: SUCCEEDED -->
  <rect x="310" y="660" width="180" height="40" rx="8" ry="8" fill="white" stroke="black" stroke-width="2"/>
  <text x="314" y="672" font-family="Arial,Helvetica,sans-serif" font-size="8">326</text>
  <text x="400" y="685" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold">SUCCEEDED</text>

  <!-- Arrow → QUEUED -->
  <line x1="400" y1="700" x2="400" y2="730" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
  <text x="415" y="720" font-family="Arial,Helvetica,sans-serif" font-size="8">queue()</text>

  <!-- 328: QUEUED -->
  <rect x="290" y="732" width="220" height="55" rx="8" ry="8" fill="white" stroke="black" stroke-width="2"/>
  <text x="294" y="744" font-family="Arial,Helvetica,sans-serif" font-size="8">328</text>
  <text x="400" y="760" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold">QUEUED</text>
  <text x="400" y="777" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="8">(Timelock delay per tier)</text>

  <!-- Arrow execute → EXECUTED -->
  <line x1="510" y1="759" x2="580" y2="759" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
  <text x="540" y="752" font-family="Arial,Helvetica,sans-serif" font-size="8">execute()</text>

  <!-- 330: EXECUTED -->
  <rect x="580" y="740" width="120" height="40" rx="8" ry="8" fill="white" stroke="black" stroke-width="2"/>
  <text x="584" y="752" font-family="Arial,Helvetica,sans-serif" font-size="8">330</text>
  <text x="640" y="765" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold">EXECUTED</text>

  <!-- Arrow expired → EXPIRED -->
  <line x1="290" y1="759" x2="200" y2="759" stroke="black" stroke-width="1" marker-end="url(#arr)"/>
  <text x="243" y="752" font-family="Arial,Helvetica,sans-serif" font-size="8">expired</text>

  <!-- 332: EXPIRED -->
  <rect x="90" y="740" width="110" height="40" rx="4" ry="4" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="94" y="752" font-family="Arial,Helvetica,sans-serif" font-size="8">332</text>
  <text x="145" y="765" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="bold">EXPIRED</text>

  <!-- Figure number -->
  <text x="400" y="840" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="9" font-style="italic">FIG. 3 — Governance Proposal State Machine</text>
</svg>
